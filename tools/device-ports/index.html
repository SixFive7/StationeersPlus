<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stationeers Devices &amp; Power/Data Ports</title>
<style>
:root{--bg:#0f1216;--panel:#171c23;--panel2:#1e242d;--line:#2a323d;--fg:#e6edf3;--mut:#8b97a6;--accent:#3b82f6;--tbH:54px;--srH:34px}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
.mut{color:var(--mut)}
header{padding:16px 20px 8px}
h1{margin:0 0 4px;font-size:19px}
.sub{color:var(--mut);font-size:13px}
.chips{margin-top:9px;display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:12px}
.chip b{color:#fff}
.toolbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:10px 20px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;gap:9px;flex-wrap:wrap;align-items:center}
input,select,.ms-btn{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px}
input[type=text]{min-width:230px}
button{background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:7px;padding:7px 11px;font-size:13px;cursor:pointer}
button:hover{border-color:var(--accent)}
label.ck{display:flex;gap:6px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer;white-space:nowrap}
label.ck input{accent-color:var(--accent);width:15px;height:15px}
.count{margin-left:auto;color:var(--mut);font-size:13px;white-space:nowrap}
.legend{padding:7px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;color:var(--mut);font-size:12px;border-bottom:1px solid var(--line)}
.ms{position:relative;display:inline-block}
.ms-btn{cursor:pointer;width:100%;text-align:left;padding:4px 8px;font-size:12px}
.ms-btn:after{content:"\25BE";float:right;color:var(--mut);margin-left:8px}
.ms-btn.on{border-color:var(--accent)}
.ms-pop{position:absolute;top:calc(100% + 3px);left:0;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:6px;z-index:50;min-width:140px;max-height:260px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ms-pop label{display:flex;gap:7px;align-items:center;padding:3px 7px;border-radius:5px;cursor:pointer;white-space:nowrap;font-size:12px}
.ms-pop label:hover{background:var(--panel2)}
.ms-pop input{accent-color:var(--accent);width:14px;height:14px}
.wrap{padding:0 12px 48px}
table{border-collapse:separate;border-spacing:0;width:100%;font-size:13px}
thead .sortrow th{position:sticky;top:var(--tbH);z-index:20;background:var(--panel);border-bottom:1px solid var(--line);text-align:left;padding:8px 10px;cursor:pointer;user-select:none;white-space:nowrap}
thead .sortrow th .ar{color:var(--accent);font-size:11px}
thead .sortrow th:hover{color:#fff}
thead .filterrow th{position:sticky;top:calc(var(--tbH) + var(--srH));z-index:19;background:var(--panel2);border-bottom:2px solid var(--line);padding:5px 8px;font-weight:normal}
.filterrow input,.filterrow select{width:100%;min-width:0;padding:4px 6px;font-size:12px;background:var(--bg)}
.comp{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.comp label{display:flex;gap:3px;align-items:center;font-size:11px;color:var(--mut);cursor:pointer;white-space:nowrap}
.comp input{accent-color:var(--accent);width:14px;height:14px}
.comp select{width:auto;flex:0 0 auto}
tbody td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:hover{background:#11161c}
tr.mod{background:rgba(124,58,237,.06)}
.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12.5px;color:#cdd6e0}
.tname{color:var(--mut);font-size:12px}
.filt{cursor:pointer}
.filt:hover{color:var(--accent);text-decoration:underline}
.modtag{display:inline-block;background:#3b2d63;color:#d6c9ff;border:1px solid #5b4a8f;border-radius:6px;padding:1px 7px;font-size:11.5px;white-space:nowrap}
.van{color:var(--mut)}
.rk{display:inline-block;font-size:10px;border-radius:4px;padding:0 5px;margin-left:6px;white-space:nowrap;vertical-align:1px;cursor:pointer}
.rk.rko{background:#7c2d12;color:#fed7aa;border:1px solid #9a3412}
.rk.rkf{background:#134e4a;color:#99f6e4;border:1px solid #115e59}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.b{display:inline-block;border-radius:5px;padding:1px 7px;font-size:11.5px;color:#fff;white-space:nowrap}
.b .i{opacity:.7;font-size:10px;margin-right:3px}
.p-powerdata{background:#7c3aed}.p-power{background:#ea580c}.p-data{background:#2563eb}
.num{text-align:right;color:var(--mut);font-variant-numeric:tabular-nums}
.dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
.empty{padding:40px;text-align:center;color:var(--mut)}
footer{padding:14px 20px;color:var(--mut);font-size:12px;border-top:1px solid var(--line)}
</style></head>
<body>
<header>
<h1>Stationeers Devices &amp; Power/Data Ports</h1>
<div class="sub" id="sub"></div>
<div class="chips" id="chips"></div>
</header>
<div class="toolbar">
<input type="text" id="q" placeholder="Search name / prefab / type   ( press / )">
<label class="ck"><input type="checkbox" id="hideCables" checked>Hide cables (<span id="cableN"></span>)</label>
<select id="rocketsel" title="Where it can be built (IRocketComponent / IRocketInternals.StrictlyInternal)"><option value="">Build location: all</option><option value="base">Base only</option><option value="both">Base + rocket</option><option value="only">Rocket only</option></select>
<button id="reset">Reset</button>
<button id="csv">Download CSV</button>
<button id="json">Download JSON</button>
<span class="count" id="count"></span>
</div>
<div class="legend">
<span><span class="dot p-powerdata"></span>Power+Data</span>
<span><span class="dot p-power"></span>Power</span>
<span><span class="dot p-data"></span>Data</span>
<span class="mut">in / out = role &middot; click a Type / Mod / rocket tag to filter &middot; click a column header to sort</span>
</div>
<div class="wrap">
<table>
<thead>
<tr class="sortrow">
<th data-k="n">Name <span class="ar"></span></th>
<th data-k="p">PrefabName <span class="ar"></span></th>
<th data-k="t">Type <span class="ar"></span></th>
<th data-k="m">Mod <span class="ar"></span></th>
<th data-k="pc" class="num">Ports <span class="ar"></span></th>
<th data-k="_">Port layout (power/data only)</th>
</tr>
<tr class="filterrow">
<th><input type="text" id="fN" placeholder="filter name"></th>
<th><input type="text" id="fP" placeholder="filter prefab"></th>
<th><input type="text" id="fT" list="typelist" placeholder="filter type"></th>
<th><select id="modsel"></select></th>
<th><span class="ms" id="pcountMs"><button type="button" class="ms-btn" id="pcountBtn"><span id="pcountLbl">any</span></button><div class="ms-pop" id="pcountPop" hidden></div></span></th>
<th><div class="comp"><span class="mut">has</span>
<label><input type="checkbox" class="pc" value="power">Pwr</label>
<label><input type="checkbox" class="pc" value="data">Data</label>
<label><input type="checkbox" class="pc" value="powerdata">Pwr+Dat</label>
<select id="pmode"><option value="all">all</option><option value="any">any</option><option value="exact">exact</option></select>
</div></th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
<div class="empty" id="empty" style="display:none">No devices match the filters.</div>
</div>
<datalist id="typelist"></datalist>
<footer id="foot"></footer>

function filtered(){
  const q=$("#q").value.trim().toLowerCase();
  const hideCables=$("#hideCables").checked;
  const rkf=$("#rocketsel").value;
  const fN=$("#fN").value.trim().toLowerCase();
  const fP=$("#fP").value.trim().toLowerCase();
  const fT=$("#fT").value.trim().toLowerCase();
  const modSel=$("#modsel").value;
  const pcs=pcCheckedVals();
  const checks=$$(".pc:checked").map(c=>c.value);
  const pmode=$("#pmode").value;
  let rows=DATA.filter(d=>{
    if(hideCables&&d.cable)return false;
    if(rkf==="base"&&d.rk)return false;
    if(rkf==="both"&&!(d.rk&&!d.rko))return false;
    if(rkf==="only"&&!d.rko)return false;
    if(q&&!(d.n.toLowerCase().includes(q)||d.p.toLowerCase().includes(q)||d.t.toLowerCase().includes(q)))return false;
    if(fN&&!d.n.toLowerCase().includes(fN))return false;
    if(fP&&!d.p.toLowerCase().includes(fP))return false;
    if(fT&&!d.t.toLowerCase().includes(fT))return false;
    if(modSel==="__van__"&&d.mod)return false;
    if(modSel==="__mod__"&&!d.mod)return false;
    if(modSel&&modSel!=="__van__"&&modSel!=="__mod__"&&d.m!==modSel)return false;
    if(pcs.length&&!pcs.includes(d.pc))return false;
    if(checks.length){
      const cs=d._cs;
      if(pmode==="all"){if(!checks.every(c=>cs.includes(c)))return false;}
      else if(pmode==="any"){if(!checks.some(c=>cs.includes(c)))return false;}
      else{if(cs.length!==checks.length||!checks.every(c=>cs.includes(c)))return false;}
    }
    return true;
  });
  rows.sort((a,b)=>{
    let x,y;
    if(sortK==="pc"){x=a.pc;y=b.pc;}
    else if(sortK==="m"){x=(a.m||"~~~").toLowerCase();y=(b.m||"~~~").toLowerCase();}
    else{x=(a[sortK]||"").toLowerCase();y=(b[sortK]||"").toLowerCase();}
    if(x<y)return -sortDir;if(x>y)return sortDir;
    return a.p.toLowerCase()<b.p.toLowerCase()?-1:1;
  });
  return rows;
}
function badges(ports){return '<div class="badges">'+ports.map((p,i)=>`<span class="b p-${p.c}" title="${esc(p.ti)}"><span class="i">${i}</span>${esc(p.l)}</span>`).join("")+'</div>';}
function rktag(d){
  if(d.rko)return ` <span class="rk rko" data-frk="only" title="${esc("Rocket only — can only be built inside a rocket (the game blocks placing it in a base)"+(d.rkc?" · cell: "+d.rkc:""))}">🚀 Rocket only</span>`;
  if(d.rk) return ` <span class="rk rkf" data-frk="both" title="${esc("Base + rocket — buildable in a normal base and inside a rocket"+(d.rkc?" · cell: "+d.rkc:""))}">🚀 Base + rocket</span>`;

}

$("#csv").onclick=()=>{
  const rows=filtered();const maxp=Math.max(0,...rows.map(r=>r.pc));
  const head=["Name","PrefabName","Type","Mod","IsModded","Rocket","RocketOnly","RocketCell","PortCount"].concat(Array.from({length:maxp},(_,i)=>"Port"+i));
  const q=s=>'"'+String(s==null?"":s).replace(/"/g,'""')+'"';
  const lines=[head.map(q).join(",")];
  rows.forEach(d=>{const r=[d.n,d.p,d.t,d.m,d.mod?"yes":"no",d.rk?"yes":"no",d.rko?"yes":"no",d.rkc,d.pc];for(let i=0;i<maxp;i++)r.push(d.ports[i]?d.ports[i].l:"");lines.push(r.map(q).join(","));});
  dl(new Blob([lines.join("\r\n")],{type:"text/csv"}),"stationeers-device-ports.csv");
};
$("#json").onclick=()=>{
  const rows=filtered().map(d=>({name:d.n,prefabName:d.p,type:d.t,mod:d.m||"vanilla",rocketFamily:d.rk,rocketOnly:d.rko,rocketCell:d.rkc,portCount:d.pc,ports:d.ports.map(p=>p.l)}));
  dl(new Blob([JSON.stringify(rows,null,2)],{type:"application/json"}),"stationeers-device-ports.json");
};
function dl(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}

window.addEventListener("resize",layout);
updatePcountLabel();render();
</script>
</body></html>
